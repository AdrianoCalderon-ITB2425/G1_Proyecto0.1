services:

  s1-proxy:
    build: ./Balancer
    container_name: s1-proxy
    restart: unless-stopped
    privileged: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Balancer/balancer.conf:/etc/apache2/sites-available/000-default.conf
      - ./Balancer/ssl:/etc/apache2/ssl
    depends_on:
      - s2-app
      - s3-app
      - s4-upload
    networks:
      - net-proxy
      - net-app
      - net-vpn

  s2-app: &node_base
    build: ./Nodes
    container_name: s2-app
    restart: unless-stopped
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./html:/var/www/html
      - ./uploads:/var/www/html/uploads
    networks:
      - net-app
      - net-db

  s3-app:
    <<: *node_base
    container_name: s3-app

  s4-upload:
    <<: *node_base
    container_name: s4-upload

  s5-images:
    image: httpd:2.4
    container_name: s5-images
    restart: unless-stopped
    volumes:
      - ./uploads:/usr/local/apache2/htdocs/imatges_grup1:ro
    networks:
      - net-vpn

  s6-static:
    image: httpd:2.4
    container_name: s6-static
    restart: unless-stopped
    volumes:
      - ./html:/usr/local/apache2/htdocs:ro
    networks:
      - net-app

  s7-db:
    image: mariadb:10.6
    container_name: s7_database
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./BBDD/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - net-db

  s8-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: s8-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=pirineus
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - net-monitor

  s9-kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: s9-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://s8-elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=pirineus
    depends_on:
      - s8-elasticsearch
    networks:
      - net-monitor

  s10-monitorizacion:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: s10-monitorizacion
    restart: unless-stopped
    user: root
    environment:
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=pirineus
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/snap/docker/common/var-lib-docker/containers:/var/lib/docker/containers:ro
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - s8-elasticsearch
    networks:
      - net-monitor

networks:
  net-proxy:    
    driver: bridge
  net-app:      
    driver: bridge
  net-db:        
    driver: bridge
  net-vpn:      
    driver: bridge
  net-monitor:  
    driver: bridge

volumes:        
  db_data:      
  php_sessions: 
  es_data:
